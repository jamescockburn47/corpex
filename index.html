<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corpex — Corporate Intelligence</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 1.2em;
            flex-direction: column;
            gap: 16px;
        }
        .loading .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #333;
            border-top-color: #5b8dd9;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div>Loading Corpex...</div>
    </div>
    <canvas id="corpex_canvas"></canvas>
    <script>
        // Hide loading indicator once WASM is running
        // The eframe WebRunner will take over the canvas
        document.addEventListener('DOMContentLoaded', function() {
            // Give WASM a moment to initialise before hiding
            setTimeout(function() {
                var el = document.getElementById('loading');
                if (el) el.style.display = 'none';
            }, 100);
        });
    </script>
    <link data-trunk rel="rust" data-wasm-opt="2" />
</body>
</html>
